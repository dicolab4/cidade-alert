<!DOCTYPE html>
<html>

<head>

<title>Mapa de Ocorrências da Cidade</title>

<link rel="stylesheet"
href="https://unpkg.com/leaflet/dist/leaflet.css"/>

<link rel="stylesheet"
href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css"/>

<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>

<script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">
Consulta Pública de Ocorrências
</div>

<div class="container">

<button onclick="voltarInicio()">← Voltar</button>

<p>Veja os problemas registrados na cidade.</p>

<select id="filtro" onchange="carregar()">

<option value="">Todas</option>
<option value="aberto">Abertas</option>
<option value="concluido">Concluídas</option>

</select>

<div id="map"></div>

<div class="legenda">

<b>Legenda</b><br>

<span style="color:green">●</span> Mato<br>
<span style="color:blue">●</span> Vazamento<br>
<span style="color:black">●</span> Buraco<br>
<span style="color:yellow">●</span> Iluminação<br>
<span style="color:red">●</span> Lixo / Entulho

</div>

<div id="lista"></div>

</div>

<script src="mapa-publico.js"></script>

<script>

function voltarInicio(){
window.location="index.html"
}

</script>

</body>

</html>
